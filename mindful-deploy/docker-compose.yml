services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"

volumes:
  node_modules:
